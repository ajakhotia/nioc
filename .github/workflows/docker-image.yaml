name: docker-image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main

jobs:
  base-stage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_base:
          - ubuntu:22.04
          - ubuntu:24.04

    steps:
      - name: self-checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: setup-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image-name
        id: image-name
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base }}/base

      - name: base
        uses: ./external/infraCommons/.github/actions/docker-typical-build-push
        with:
          dockerfile: docker/ubuntu.dockerfile
          target-stage: base
          image-name: ${{ steps.image-name.outputs.name }}
          build-args: |
            OS_BASE=${{ matrix.os_base }}


  dev-build-test-deploy-stages:
    needs: base-stage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_base:
          - ubuntu:22.04
          - ubuntu:24.04
        toolchain:
          - linux-clang-19
          - linux-gnu-default

    steps:
      - name: self-checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: setup-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: dev-base-image-name
        id: dev-base-image-name
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base }}/${{ matrix.toolchain }}/dev-base

      - name: dev-base
        uses: ./external/infraCommons/.github/actions/docker-typical-build-push
        with:
          dockerfile: docker/ubuntu.dockerfile
          target-stage: dev-base
          image-name: ${{ steps.dev-base-image-name.outputs.name }}
          build-args: |
            OS_BASE=${{ matrix.os_base }}
            TOOLCHAIN=${{ matrix.toolchain }}

      - name: build-image-name
        id: build-image-name
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base }}/${{ matrix.toolchain }}/build

      - name: build
        uses: ./external/infraCommons/.github/actions/docker-typical-build-push
        with:
          dockerfile: docker/ubuntu.dockerfile
          target-stage: build
          image-name: ${{ steps.build-image-name.outputs.name }}
          build-args: |
            OS_BASE=${{ matrix.os_base }}
            TOOLCHAIN=${{ matrix.toolchain }}

      - name: test-image-name
        id: test-image-name
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base }}/${{ matrix.toolchain }}/test

      - name: test
        uses: ./external/infraCommons/.github/actions/docker-typical-build-push
        with:
          dockerfile: docker/ubuntu.dockerfile
          target-stage: test
          image-name: ${{ steps.test-image-name.outputs.name }}
          build-args: |
            OS_BASE=${{ matrix.os_base }}
            TOOLCHAIN=${{ matrix.toolchain }}

      - name: deploy-image-name
        id: deploy-image-name
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base }}/${{ matrix.toolchain }}/deploy

      - name: deploy
        uses: ./external/infraCommons/.github/actions/docker-typical-build-push
        with:
          dockerfile: docker/ubuntu.dockerfile
          target-stage: deploy
          image-name: ${{ steps.deploy-image-name.outputs.name }}
          build-args: |
            OS_BASE=${{ matrix.os_base }}
            TOOLCHAIN=${{ matrix.toolchain }}


  find-libraries:
    needs: dev-build-test-deploy-stages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_base:
          - ubuntu:22.04
          - ubuntu:24.04
        toolchain:
          - linux-clang-19
          - linux-gnu-default
        library-name:
          - nioc

    steps:
      - name: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: setup-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image-name
        id: image-name
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base }}/${{ matrix.toolchain }}/deploy

      - name: find-library
        uses: ./external/infraCommons/.github/actions/cmake-find-package
        with:
          library-name: ${{ matrix.library-name }}
          prefix-path: "/opt/robotFarm;/opt/nioc"
          image-name: ${{ steps.image-name.outputs.name }}

  aggregate-find-libraries:
    name: aggregate-find-libraries
    if: always()
    needs: [ find-libraries ]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job failed
        run: |
          echo "find-libraries result: ${{ needs.find-libraries.result }}"
          if [ "${{ needs.find-libraries.result }}" != "success" ]; then
            echo "One or more find-libraries matrix runs failed."
            exit 1
          fi
